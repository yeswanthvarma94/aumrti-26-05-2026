<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aumrti HMS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #EFF6FF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748B; line-height: 1.6; }
    .features {
      margin: 24px 0;
      text-align: left;
      background: #F8FAFC;
      border-radius: 10px;
      padding: 16px;
    }
    .features p { font-size: 12px; color: #475569; margin-bottom: 6px; }
    .features p::before { content: "✓ "; color: #10B981; font-weight: 700; }
    .retry {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: #1A2F5A;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .retry:hover { background: #243d75; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features are available from cache.</p>
    <div class="features">
      <p>OPD token list (last loaded)</p>
      <p>Recent patient records</p>
      <p>Drug formulary</p>
      <p>Previously viewed reports</p>
    </div>
    <button class="retry" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
